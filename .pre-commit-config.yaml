repos:
  # ---------------------------------------------------------------------------
  # Local inner dev loop: format, lint, test. Delegated to the Makefile so CI
  # and the pre-commit hook stay in lockstep.
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: make-format
        name: make format
        entry: make format
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: make-lint
        name: make lint
        entry: make lint
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: make-test
        name: make test
        entry: make test
        language: system
        pass_filenames: false
        stages: [pre-commit]

  # ---------------------------------------------------------------------------
  # Security gate — fast local feedback before CI (Trivy + CodeQL) runs.
  # Bandit: Python SAST.
  # pip-audit: dependency CVE scan against PyPA Advisory DB / OSV.
  # gitleaks: secret scanning, blocks leaks before they leave the laptop.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/PyCQA/bandit
    rev: "1.9.4"
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-r", "src"]
        additional_dependencies: ["bandit[toml]"]
        pass_filenames: false

  - repo: https://github.com/pypa/pip-audit
    rev: v2.10.0
    hooks:
      - id: pip-audit
        args: ["--strict"]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
